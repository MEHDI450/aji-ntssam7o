<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paroles Dynamiques - Bombom</title>
    <style>
        /* Arrière-plan */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #3c0a5e 0%, #1a0033 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', Impact, sans-serif;
            overflow: hidden;
            color: white;
            /* Empêche la sélection de texte accidentelle sur mobile */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* 1. L'EFFET NÉON QUI CLIGNOTE */
        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 5px #ffffff,
                    0 0 10px #ffffff,
                    0 0 20px #00ffff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff,
                    0 0 100px #00bfff;
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.4;
            }
        }

        .neon-title {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 60px;
            text-align: center;
            animation: neon-flicker 3s infinite alternate; 
            padding: 0 15px; /* Marge intérieure pour éviter de coller aux bords */
        }

        /* 2. LE CONTENEUR DES PAROLES */
        #dynamic-lyrics {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. L'ANIMATION DES PAROLES QUI MONTENT */
        .lyric-line {
            position: absolute;
            font-size: 2.5rem;
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
            width: 90%; /* Garde le texte centré sans déborder */
            
            /* État de départ */
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .lyric-line.active {
            opacity: 1;
            transform: translateY(0);
        }

        .lyric-line.exit {
            opacity: 0;
            transform: translateY(-40px);
        }

        /* Signature et UI */
        #signature {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            font-weight: 100;
        }

        #start-btn {
            position: absolute;
            top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #00ffff;
            color: #1a0033;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4); /* Joli effet de bouton */
        }
        
        #timer-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: monospace;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* =======================================================
           ADAPTATION POUR TÉLÉPHONES (MEDIA QUERIES)
           ======================================================= */
        @media (max-width: 600px) {
            .neon-title {
                font-size: 1.8rem; /* Titre plus petit */
                letter-spacing: 2px;
                margin-bottom: 40px;
            }

            .lyric-line {
                font-size: 1.5rem; /* Paroles plus petites pour rentrer sur l'écran */
            }

            #dynamic-lyrics {
                height: 80px;
            }

            #start-btn {
                top: 50%; /* Centre le bouton sur mobile avant le démarrage */
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 1.1rem;
                width: 80%;
                text-align: center;
            }

            #timer-display {
                top: 15px;
                left: 15px;
                font-size: 1rem;
            }

            #signature {
                bottom: 10px;
                right: 10px;
                font-size: 0.8rem; /* Signature plus discrète */
            }
        }
    </style>
</head>
<body>

    <div id="timer-display">0.0s</div>
    <button id="start-btn">▶️ Démarrer l'animation</button>

    <div class="neon-title">🎵 AJI NTSSAM7O 🎵</div>
    
    <div id="dynamic-lyrics"></div>
    
    <div id="signature">( حميدة المبرمج 💔😂 )</div>

    <audio id="musique-bombom" src="Bombom (mp3cut.net).mp3" preload="auto"></audio>

    <script>
        const parolesData = [
            { time: 0.0, text: "BOM 💥 BOM 💥 BOM 💥 BOM 💥" },
            { time: 1.8, text: "Menek majani noum" },
            { time: 3.6, text: "Aji 3ndi ntssamho 🥺" },
            { time: 5.4, text: "OYA K7let l3youn 😍" },
            { time: 7.2, text: "BOM 💥 BOM 💥 BOM 💥 BOM 💥" },
            { time: 9.0, text: "Nti tfaji lhmoooom 😍" },
            { time: 10.8, text: "3lach bghina ntkhasmo 🥺" },
            { time: 12.6, text: "Glbi mnk m7roum 💔" },
        ];

        const lyricsContainer = document.getElementById('dynamic-lyrics');
        const timerDisplay = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        
        const musique = document.getElementById('musique-bombom');
        
        let animationInterval;
        let currentIndex = -1;

        function updateLyrics() {
            const elapsedTime = musique.currentTime; 
            timerDisplay.innerText = elapsedTime.toFixed(1) + "s";

            let nextIndex = -1;
            for (let i = 0; i < parolesData.length; i++) {
                if (elapsedTime >= parolesData[i].time) {
                    nextIndex = i;
                } else {
                    break;
                }
            }

            if (nextIndex !== currentIndex && nextIndex !== -1) {
                const currentElement = document.querySelector('.lyric-line.active');
                if (currentElement) {
                    currentElement.classList.remove('active');
                    currentElement.classList.add('exit'); 
                    setTimeout(() => currentElement.remove(), 500); 
                }

                currentIndex = nextIndex;
                
                if (parolesData[currentIndex].text !== "") {
                    const newElement = document.createElement('div');
                    newElement.className = 'lyric-line';
                    newElement.innerHTML = parolesData[currentIndex].text;
                    
                    lyricsContainer.appendChild(newElement);

                    void newElement.offsetWidth; 
                    newElement.classList.add('active');
                }
            }
        }

        startBtn.addEventListener('click', () => {
            musique.currentTime = 0;
            musique.play();

            // Rétablit le style du bouton pour qu'il ne reste pas au centre s'il réapparaît
            startBtn.style.display = 'none';
            currentIndex = -1;
            lyricsContainer.innerHTML = ''; 
            
            if (animationInterval) clearInterval(animationInterval);
            animationInterval = setInterval(updateLyrics, 50);
        });

        musique.addEventListener('ended', () => {
            clearInterval(animationInterval);
            // Remet le bouton au centre sur mobile
            startBtn.style.display = 'block';
            startBtn.innerText = "▶️ Recommencer";
            timerDisplay.innerText = "0.0s";
        });
    </script>

</body>
</html>
